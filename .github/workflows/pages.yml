name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Finnhub API key into HTML files
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          echo "🔑 Injecting Finnhub API key..."
          for f in index.html popular-stocks.html canadian-stocks.html us-stocks.html screener.html earnings.html dividends.html crypto.html northstock-portfolio-live.html; do
            if [ -f "$f" ]; then
              sed -i "s/__FINNHUB_KEY__/${FINNHUB_API_KEY}/g" "$f"
              echo "✅ $f — clé injectée"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
