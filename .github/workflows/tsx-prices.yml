name: TSX Price Updater — Every 15 min (Market Hours)
on:
  schedule:
    # Every 15 min, Mon-Fri, 9:30 AM - 4:15 PM ET (13:30-20:15 UTC)
    - cron: '30,45 13 * * 1-5'
    - cron: '0,15,30,45 14,15,16,17,18,19 * * 1-5'
    - cron: '0,15 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-tsx-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Fetch TSX prices from Yahoo Finance
        run: |
          SYMBOLS="SHOP.TO,RY.TO,ENB.TO,TD.TO,CNR.TO,ATD.TO,SU.TO,BNS.TO,BMO.TO,MFC.TO,BCE.TO,TRI.TO,IFC.TO,WCN.TO,QSR.TO,CP.TO,TRP.TO,PPL.TO,CVE.TO,ABX.TO"
          
          echo "Fetching TSX prices for: $SYMBOLS"
          
          RESPONSE=$(curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/json" \
            "https://query1.finance.yahoo.com/v7/finance/quote?symbols=${SYMBOLS}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketPreviousClose" \
            2>/dev/null)
          
          if [ -z "$RESPONSE" ]; then
            echo "Primary URL failed, trying backup..."
            RESPONSE=$(curl -s -L \
              -H "User-Agent: Mozilla/5.0" \
              "https://query2.finance.yahoo.com/v7/finance/quote?symbols=${SYMBOLS}&fields=regularMarketPrice,regularMarketChangePercent" \
              2>/dev/null)
          fi
          
          echo "Got response, processing..."
          
          # Parse and write JSON file
          python3 << 'PYEOF'
          import json, os, datetime

          response_str = os.popen('echo $RESPONSE_DATA').read()
          
          # Re-fetch using Python (more reliable than shell variable passing)
          import urllib.request
          symbols = "SHOP.TO,RY.TO,ENB.TO,TD.TO,CNR.TO,ATD.TO,SU.TO,BNS.TO,BMO.TO,MFC.TO,BCE.TO,TRI.TO,IFC.TO,WCN.TO,QSR.TO,CP.TO,TRP.TO,PPL.TO,CVE.TO,ABX.TO"
          url = f"https://query1.finance.yahoo.com/v7/finance/quote?symbols={symbols}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketPreviousClose"
          
          req = urllib.request.Request(url, headers={
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'application/json',
          })
          
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
          except Exception as e:
              # Try backup URL
              url2 = url.replace('query1', 'query2')
              req2 = urllib.request.Request(url2, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req2, timeout=10) as r:
                  data = json.loads(r.read())
          
          prices = {}
          for q in data.get('quoteResponse', {}).get('result', []):
              sym = q.get('symbol', '')
              price = q.get('regularMarketPrice', 0)
              pct = q.get('regularMarketChangePercent', 0)
              if price > 0:
                  prices[sym] = {'price': round(price, 2), 'pct': round(pct, 4)}
                  print(f"  {sym}: ${price:.2f} ({pct:+.2f}%)")
          
          now = datetime.datetime.utcnow().isoformat() + 'Z'
          output = {'updatedAt': now, 'prices': prices}
          
          os.makedirs('data', exist_ok=True)
          with open('data/prices-tsx.json', 'w') as f:
              json.dump(output, f)
          
          print(f"\n✅ Wrote {len(prices)} prices to data/prices-tsx.json")
          PYEOF

      - name: Commit and push prices
        run: |
          git config user.name "NorthStock Bot"
          git config user.email "bot@northstock.ca"
          git add data/prices-tsx.json
          
          if git diff --staged --quiet; then
            echo "No price changes — skipping commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "📈 TSX prices update — $TIMESTAMP"
            git push
            echo "✅ Prices committed and pushed"
          fi
