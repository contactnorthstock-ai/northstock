<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — NorthStock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#06111f;--navy2:#0d1f3c;--blue:#3b9eff;--blue2:#1a7fe0;--green:#22c55e;--red:#ef4444;--gold:#f59e0b;--text:#f0f4f8;--text2:#8ea4bc;--text3:#4d6278;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--card:rgba(255,255,255,0.04);--radius:10px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--navy);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

nav{background:var(--navy2);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:56px}
.logo{font-size:19px;font-weight:600;letter-spacing:-.4px}.logo span{color:var(--blue)}

.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.auth-card{background:var(--navy2);border:1px solid var(--border2);border-radius:16px;padding:36px;width:100%;max-width:420px}

.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .logo{font-size:24px}
.auth-logo p{font-size:13px;color:var(--text3);margin-top:6px}

.auth-tabs{display:flex;background:var(--card);border-radius:8px;padding:3px;margin-bottom:28px}
.auth-tab{flex:1;padding:8px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font);transition:all .15s}
.auth-tab.active{background:var(--navy2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}

.form-group{margin-bottom:16px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-input{width:100%;background:var(--navy);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:var(--font);transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--blue)}
.form-input::placeholder{color:var(--text3)}

.btn-submit{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);transition:background .15s;margin-top:8px}
.btn-submit:hover{background:var(--blue2)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:12px;color:var(--text3)}

.btn-google{width:100%;background:transparent;border:1px solid var(--border2);border-radius:8px;padding:11px;font-size:13px;color:var(--text2);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.btn-google:hover{color:var(--text);border-color:var(--text3);background:var(--card)}
.google-icon{width:18px;height:18px}

.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--text3)}
.auth-footer a{color:var(--blue)}

.alert{border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:16px;display:none}
.alert.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}
.alert.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#4ade80}
.alert.show{display:block}

.password-wrap{position:relative}
.password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1}

.strength-bar{height:3px;border-radius:2px;margin-top:6px;background:var(--border);overflow:hidden;transition:all .3s}
.strength-fill{height:100%;border-radius:2px;transition:all .3s}

.features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.feature{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.feature-icon{color:var(--green);font-size:14px}

footer{background:var(--navy);border-top:1px solid var(--border);padding:16px 32px;text-align:center}
.footer-copy{font-size:12px;color:var(--text3)}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">North<span>Stock</span></a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit">North<span>Stock</span></a></div>
      <p>Track smarter. Invest with confidence.</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignin" onclick="switchTab('signin')">Sign in</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Create account</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- SIGN IN FORM -->
    <div id="formSignin">
      <div class="form-group">
        <label>Email address</label>
        <input class="form-input" type="email" id="siEmail" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password">
          <button class="password-toggle" onclick="togglePwd('siPassword',this)">👁</button>
        </div>
      </div>
      <div style="text-align:right;margin-bottom:16px">
        <a href="#" style="font-size:12px;color:var(--blue)" onclick="showForgot()">Forgot password?</a>
      </div>
      <button class="btn-submit" id="btnSignin" onclick="signIn()">Sign in</button>

      <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>

      <button class="btn-google" onclick="signInGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGN UP FORM -->
    <div id="formSignup" style="display:none">
      <div class="form-group">
        <label>Full name</label>
        <input class="form-input" type="text" id="suName" placeholder="John Smith" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input class="form-input" type="email" id="suEmail" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="suPassword" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
          <button class="password-toggle" onclick="togglePwd('suPassword',this)">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px" id="strengthLabel"></div>
      </div>
      <button class="btn-submit" id="btnSignup" onclick="signUp()">Create free account</button>

      <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>

      <button class="btn-google" onclick="signInGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="features">
        <div class="feature"><span class="feature-icon">✓</span>Portfolio tracker</div>
        <div class="feature"><span class="feature-icon">✓</span>Earnings alerts</div>
        <div class="feature"><span class="feature-icon">✓</span>Dividend calendar</div>
        <div class="feature"><span class="feature-icon">✓</span>Cloud sync</div>
      </div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="formForgot" style="display:none">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:32px;margin-bottom:8px">🔑</div>
        <div style="font-size:15px;font-weight:500;margin-bottom:6px">Reset your password</div>
        <div style="font-size:13px;color:var(--text3)">Enter your email and we'll send you a reset link</div>
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input class="form-input" type="email" id="forgotEmail" placeholder="your@email.com">
      </div>
      <button class="btn-submit" onclick="resetPassword()">Send reset link</button>
      <div style="text-align:center;margin-top:16px">
        <a href="#" style="font-size:13px;color:var(--blue)" onclick="switchTab('signin')">← Back to sign in</a>
      </div>
    </div>

  </div>
</div>

<footer><div class="footer-copy">© 2026 NorthStock · Your data is secure · <a href="#" style="color:var(--text3)">Privacy Policy</a></div></footer>

<script>
// ── SUPABASE INIT ──────────────────────────────
const SUPABASE_URL = 'https://yxymvlgvuyfctkuhhnut.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Nu2SV3yb1sLczhtRsbd85w_j0TOOgoI';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// Check redirect from URL
const params = new URLSearchParams(window.location.search);
if (params.get('mode') === 'signup') switchTab('signup');

// Check if already logged in
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'northstock-portfolio-live.html';
});

function switchTab(tab) {
  document.getElementById('formSignin').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('formSignup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('formForgot').style.display = 'none';
  document.getElementById('tabSignin').classList.toggle('active', tab === 'signin');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  hideAlert();
}

function showForgot() {
  document.getElementById('formSignin').style.display = 'none';
  document.getElementById('formForgot').style.display = 'block';
  document.getElementById('tabSignin').classList.remove('active');
}

function showAlert(msg, type='error') {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = `alert ${type} show`;
}
function hideAlert() { document.getElementById('alertBox').className = 'alert'; }

function togglePwd(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

function checkStrength(pwd) {
  let score = 0;
  if (pwd.length >= 8) score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;
  const colors = ['','#ef4444','#f59e0b','#3b9eff','#22c55e'];
  const labels = ['','Weak','Fair','Good','Strong'];
  const fill = document.getElementById('strengthFill');
  fill.style.width = (score * 25) + '%';
  fill.style.background = colors[score] || '';
  document.getElementById('strengthLabel').textContent = labels[score] || '';
}

async function signIn() {
  const email = document.getElementById('siEmail').value.trim();
  const password = document.getElementById('siPassword').value;
  if (!email || !password) { showAlert('Please fill in all fields.'); return; }
  const btn = document.getElementById('btnSignin');
  btn.disabled = true; btn.textContent = 'Signing in...';
  hideAlert();
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showAlert(error.message); btn.disabled = false; btn.textContent = 'Sign in'; return; }
  showAlert('Welcome back! Redirecting...', 'success');
  setTimeout(() => window.location.href = 'northstock-portfolio-live.html', 1000);
}

async function signUp() {
  const name = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const password = document.getElementById('suPassword').value;
  if (!name || !email || !password) { showAlert('Please fill in all fields.'); return; }
  if (password.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
  const btn = document.getElementById('btnSignup');
  btn.disabled = true; btn.textContent = 'Creating account...';
  hideAlert();
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });
  if (error) { showAlert(error.message); btn.disabled = false; btn.textContent = 'Create free account'; return; }
  if (data.user && !data.session) {
    showAlert('Account created! Check your email to confirm your account.', 'success');
    btn.textContent = 'Check your email ✓';
  } else {
    showAlert('Account created! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'northstock-portfolio-live.html', 1000);
  }
}

async function signInGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/northstock-portfolio-live.html' }
  });
  if (error) showAlert(error.message);
}

async function resetPassword() {
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) { showAlert('Please enter your email address.'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/auth.html?mode=reset'
  });
  if (error) { showAlert(error.message); return; }
  showAlert('Reset link sent! Check your email.', 'success');
}

// Handle Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('formSignin').style.display !== 'none') signIn();
    else if (document.getElementById('formSignup').style.display !== 'none') signUp();
  }
});
</script>
</body>
</html>
